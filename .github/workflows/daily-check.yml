name: Daily signal check

on:
  schedule:
    # Daily at 00:45 UTC (after Binance's daily candle closes at 00:00 UTC).
    - cron: "45 0 * * *"
  workflow_dispatch:  # manual trigger button in the Actions tab
    inputs:
      send_digest_now:
        description: "Also send a status digest immediately (bypass the weekly schedule)"
        type: boolean
        default: false

permissions:
  contents: write  # so the workflow can commit updated data files back

concurrency:
  group: daily-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # was 10; CryptoCompare's rate-limited fetch was hitting the cap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # NOTE: scripts/fetch_data.py talks to Binance directly, which returns
      # HTTP 451 from US-based GitHub runners. We use the incremental
      # CryptoCompare updater here instead — it only fetches the missing
      # tail of data and appends to the existing parquet (which retains the
      # full Binance history that was bootstrapped locally).
      # Best-effort. The free CryptoCompare tier rate-limits ~11 calls/min, so a
      # 25-coin refresh can stall (it ran 20 min and was cancelled on 2026-07-05).
      # Time-box it and continue on failure so the regression test, dashboard
      # rebuild and — critically — the email digest still run on the freshest
      # available data. Staleness is surfaced honestly in the digest and the UI.
      - name: Fetch incremental daily update (CryptoCompare)
        timeout-minutes: 7
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8
          CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        run: python scripts/fetch_daily_update.py

      # Regression smoke test on the refreshed parquet. Asserts OOS Sharpe /
      # CAGR / bar count fall in a wide sane band. A failure here blocks the
      # rebuild + commit so the dashboard cannot silently publish numbers
      # produced by a broken backtest (dep bump, code regression, or
      # corrupted data).
      - name: Backtest regression smoke test
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/test_backtest.py

      - name: Rebuild dashboard data
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/pipeline.py

      - name: Send email alerts + regular digest
        env:
          PYTHONIOENCODING: utf-8
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          # Regular status digest (always-sends heartbeat) on top of the instant
          # change-alerts. Change cadence here: weekly (default) | daily | monthly | off.
          # DIGEST_WEEKDAY: 0=Mon … 6=Sun (weekly only). Set to 1 (Tuesday) because the
          # weekly rebalance uses the Monday close and executes on the Tuesday bar — the
          # cron at 00:45 UTC (= 08:45 SGT) Tuesday is the earliest a fresh weekly signal
          # exists. (Daily trend-exits fire any day and are covered by the instant alerts.)
          DIGEST_CADENCE: ${{ inputs.send_digest_now && 'daily' || 'weekly' }}
          DIGEST_WEEKDAY: "1"
        run: python scripts/notify.py

      - name: Commit refreshed artefacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "ci: daily refresh $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
